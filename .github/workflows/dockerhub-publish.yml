name: Docker Publish

on:
# ONLY RUNS IF ci.yml COMPLETED SUCCESSFULLY ALL ACTIONS
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: dockerhub
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract Docker Tag
        id: tag
        uses: docker/metadata-action@v5
        with:
          images: tuwumeu420/sportsclub #IMPOSSIBLE TO OVERCOME INTEGRATION TESTS, VARIABLE NOT BEING ACCESSIBLE WITHIN ENVIRONMENT
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=V

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/app/Dockerfile
          push: true
          tags: ${{ steps.tag.outputs.tags }}
          labels: ${{ steps.tag.outputs.labels }}
