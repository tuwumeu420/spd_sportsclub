# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  # Django
  SECRET_KEY: secret
  DEBUG: "False"
  ALLOWED_HOSTS: localhost,127.0.0.1
  # Database
  POSTGRES_USER: sportsclub
  POSTGRES_PASSWORD: sportsclub
  POSTGRES_DB: sportsclub
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432

jobs:
  lint:
    name: Lint & Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install security and linting tools
        run: |
          python -m pip install --upgrade pip
          # NEW: INSTALL PRE-COMMIT TO RUN ALL CONFIGURED HOOKS (RUFF, BANDIT, GITLEAKS, VULTURE, PIP-AUDIT)
          pip install pre-commit

      - name: Run security and linting hooks
        # NEW: EXECUTE ALL CHALLENGE-REQUIRED SCANS IN ONE STEP USING OUR SHARED CONFIG
        run: pre-commit run --all-files

  test:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: sportsclub
          POSTGRES_PASSWORD: sportsclub
          POSTGRES_DB: sportsclub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sportsclub"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # NEW: ENFORCE CRYPTOGRAPHIC HASH VERIFICATION FOR ALL PACKAGES (SUPPLY CHAIN SECURITY)
          pip install --require-hashes -r requirements.txt

      - name: Run migrations
        working-directory: ./sportsclub
        run: python manage.py migrate

      - name: Run tests
        working-directory: ./sportsclub
        run: python manage.py test --verbosity=2

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: .
          # NEW: ENSURE THE BUILD USES OUR HARDENED DOCKERFILE (NON-ROOT USER)
          file: docker/app/Dockerfile
          push: false
          tags: sportsclub-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat <<EOF > .env
          SECRET_KEY=secret
          DEBUG=False
          ALLOWED_HOSTS=localhost,127.0.0.1
          POSTGRES_USER=sportsclub
          POSTGRES_PASSWORD=sportsclub
          POSTGRES_DB=sportsclub
          EOF

      - name: Build and start services
       #NEW: TEST THE ORIGINAL STACK
       #run: docker compose up -d --build
       #NEW: TEST THE FULL STACK
        run: docker compose -f docker-compose.yml -f docker-compose.production.yml up -d --build

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services..."
          sleep 30
          docker compose ps

      - name: Run migrations in container
        run: |
          # NEW: ENSURE MIGRATIONS RUN INSIDE THE HARDENED BLUE CONTAINER
          docker compose exec -T app-blue python manage.py migrate

      - name: Test API endpoints
        run: |
          # VALIDATE API ACCESS UNDER NEW SECURITY HEADERS AND NON-ROOT USER
          curl -f http://localhost:8000/blue/api/v1/openapi.json || exit 1
          curl -f http://localhost:8000/green/api/v1/openapi.json || exit 1
          curl -f http://localhost:8000/api/v1/openapi.json || exit 1

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop services
        if: always()
        run: docker compose down -v
