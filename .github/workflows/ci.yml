# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  # Django
  SECRET_KEY: secret
  DEBUG: "False"
  ALLOWED_HOSTS: localhost,127.0.0.1
  # Database
  POSTGRES_USER: sportsclub
  POSTGRES_PASSWORD: sportsclub
  POSTGRES_DB: sportsclub
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432

jobs:
  lint:
    name: Lint & Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install security and linting tools
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Run security and linting hooks
        run: pre-commit run --all-files

  test:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: sportsclub
          POSTGRES_PASSWORD: sportsclub
          POSTGRES_DB: sportsclub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sportsclub"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.txt

      - name: Run migrations
        working-directory: ./sportsclub
        run: python manage.py migrate

      - name: Run tests
        working-directory: ./sportsclub
        run: python manage.py test --verbosity=2

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/app/Dockerfile
          push: false
          tags: sportsclub-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat <<EOF > .env
          SECRET_KEY=secret
          DEBUG=False
          ALLOWED_HOSTS=localhost,127.0.0.1
          POSTGRES_USER=sportsclub
          POSTGRES_PASSWORD=sportsclub
          POSTGRES_DB=sportsclub
          EOF

      # Generate CERTS live
      - name: Generate temporary SSL certificates for CI
        run: |
          mkdir -p docker/nginx/certs
          openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
            -keyout docker/nginx/certs/selfsigned.key \
            -out docker/nginx/certs/selfsigned.crt \
            -subj "/C=ES/ST=Local/L=Local/O=Security/OU=Development/CN=localhost"

      - name: Build and start services
        run: docker compose -f docker-compose.yml -f docker-compose.production.yml up -d --build

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services..."
          sleep 30
          docker compose ps

      - name: Run migrations in container
        run: |
          docker compose exec -T app-blue python manage.py migrate

      - name: Test API endpoints
        run: |
          # UPDATE: CHANGE 8000 to 8443
          curl -f -k https://localhost:8443/api/v1/openapi.json || exit 1
          # WHENEVER SEPARETED WE LEAVE BOTH SERVICES READY
          curl -f -k https://localhost:8443/blue/api/v1/openapi.json || exit 1
          curl -f -k https://localhost:8443/green/api/v1/openapi.json || exit 1

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop services
        if: always()
        run: docker compose down -v
