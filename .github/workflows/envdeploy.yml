name: Tailscale OAuth con Environment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-tailscale:
    runs-on: ubuntu-latest
    # ESTO ES CRUCIAL: Si los secretos están en el entorno, el job DEBE 
    environment: .env.production 
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Ahora GitHub sí debería "inyectar" los secretos del environment
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: SSH Test
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "¡Conectado usando secretos de .env.production!" > ~/test_env.txt
            hostname
