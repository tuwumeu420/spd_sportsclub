name: Test Tailscale Connection

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-connection:
    runs-on: ubuntu-latest
    # IMPORTANTE: NO pongas 'environment' aquí todavía para evitar bloqueos de secretos
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          # Usamos la authkey que acabamos de crear
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          # Forzamos una versión que sabemos que funciona bien con authkeys
          version: 1.62.0

      - name: Verify Connection
        run: |
          # Intentamos hacer ping a tu IP de Tailscale para ver si el túnel está levantado
          tailscale status
          ping -c 3 ${{ secrets.SERVER_IP }}

      - name: Test SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "¡CONEXIÓN TOTALMENTE ESTABLE!" > ~/exito_final.txt
            hostname -I
